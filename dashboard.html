<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luma - Stats</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px;
      padding-top: 60px;
      /* Extra padding for traffic lights */
      min-height: 100vh;
    }

    /* Drag Region for Frameless Window */
    .titlebar {
      height: 30px;
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      /* Allow dragging */
      -webkit-app-region: drag;
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      max-width: 600px;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 24px;
    }

    .card h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .today-stats {
      display: flex;
      gap: 40px;
      margin-bottom: 20px;
    }

    .stat {
      flex: 1;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 600;
      color: #58a6ff;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 13px;
      color: #999;
    }

    .streak {
      text-align: center;
      padding: 30px;
    }

    .streak-value {
      font-size: 48px;
      font-weight: 600;
      color: #ff6b35;
      margin-bottom: 8px;
    }

    .streak-label {
      font-size: 14px;
      color: #999;
    }

    .week-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      height: 120px;
      gap: 8px;
      margin-top: 20px;
    }

    .bar-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .bar {
      width: 100%;
      background: linear-gradient(180deg, #58a6ff 0%, #3d8fd1 100%);
      border-radius: 4px 4px 0 0;
      min-height: 4px;
      transition: all 0.3s ease;
    }

    .bar:hover {
      background: linear-gradient(180deg, #6bb6ff 0%, #4d9fe1 100%);
    }

    .bar-label {
      font-size: 11px;
      color: #666;
    }

    .sessions-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .session-item {
      padding: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .session-item:last-child {
      border-bottom: none;
    }

    .session-duration {
      font-size: 14px;
      color: #e0e0e0;
    }

    .session-time {
      font-size: 12px;
      color: #666;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      color: #555;
      font-size: 11px;
    }
  </style>
</head>

<body>
  <!-- Drag Region -->
  <div class="titlebar"></div>

  <h1>📊 Your Focus Stats</h1>
  <p class="subtitle">The brutal reality of your productivity</p>

  <div class="grid">
    <!-- Today Stats -->
    <div class="card">
      <h2>Today</h2>
      <div class="today-stats">
        <div class="stat">
          <div class="stat-value" id="today-time">0m</div>
          <div class="stat-label">Focus Time</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="today-sessions">0</div>
          <div class="stat-label">Sessions</div>
        </div>
      </div>
    </div>

    <!-- Streak -->
    <div class="card">
      <div class="streak">
        <div class="streak-value" id="streak">🔥 0</div>
        <div class="streak-label">Day Streak</div>
      </div>
    </div>

    <!-- This Week -->
    <div class="card">
      <h2>This Week</h2>
      <div class="week-chart" id="week-chart">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- Topics Breakdown -->
    <div class="card">
      <h2>Topics Studied</h2>
      <div id="topics-breakdown">
        <div class="empty-state">
          <div class="empty-state-icon">📚</div>
          <div>No topics yet</div>
        </div>
      </div>
    </div>

    <!-- Recent Sessions -->
    <div class="card">
      <h2>Recent Sessions</h2>
      <div class="sessions-list" id="sessions-list">
        <div class="empty-state">
          <div class="empty-state-icon">⏱️</div>
          <div>No sessions yet. Start focusing!</div>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="card">
      <h2>Settings</h2>
      <div style="display: flex; align-items: center; justify-content: space-between;">
        <div style="color: #e0e0e0; font-size: 14px;">Launch at Login</div>
        <label class="switch" style="position: relative; display: inline-block; width: 40px; height: 24px;">
          <input type="checkbox" id="autostart-toggle" style="opacity: 0; width: 0; height: 0;">
          <span class="slider"
            style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 24px;"></span>
          <style>
            .slider:before {
              position: absolute;
              content: "";
              height: 18px;
              width: 18px;
              left: 3px;
              bottom: 3px;
              background-color: white;
              transition: .4s;
              border-radius: 50%;
            }

            input:checked+.slider {
              background-color: #58a6ff;
            }

            input:checked+.slider:before {
              transform: translateX(16px);
            }
          </style>
        </label>
      </div>
    </div>
  </div>

  <div class="footer">
    Luma v0.1.0<br>
    Made with passion by Aamir Alsufi
  </div>
  </div>

  <script type="module">
    import { invoke } from '@tauri-apps/api/core';
    import { enable, disable, isEnabled } from '@tauri-apps/plugin-autostart';

    async function loadDashboard() {
      try {
        const data = await invoke('get_dashboard_data');
        const stats = await invoke('get_menu_stats');

        // Update today stats
        document.getElementById('today-time').textContent = stats.time_today;
        document.getElementById('today-sessions').textContent = stats.sessions_today;
        document.getElementById('streak').textContent = `🔥 ${stats.streak}`;

        // Setup Autostart Toggle
        const autostartToggle = document.getElementById('autostart-toggle');
        autostartToggle.checked = await isEnabled();

        autostartToggle.addEventListener('change', async (e) => {
          try {
            if (e.target.checked) {
              await enable();
              console.log('Autostart enabled');
            } else {
              await disable();
              console.log('Autostart disabled');
            }
          } catch (err) {
            console.error('Failed to toggle autostart:', err);
            e.target.checked = !e.target.checked; // Revert on error
          }
        });

        // Generate week chart
        generateWeekChart(data.daily_stats);

        // Show recent sessions
        showRecentSessions(data.sessions);

        // Show topic breakdown
        showTopicBreakdown(data.sessions);

      } catch (error) {
        console.error('Failed to load dashboard:', error);
      }
    }

    function generateWeekChart(dailyStats) {
      const chart = document.getElementById('week-chart');
      chart.innerHTML = '';

      const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const today = new Date();

      // Get last 7 days
      for (let i = 6; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];

        const dayStats = dailyStats.find(s => s.date === dateStr);
        const hours = dayStats ? dayStats.total_focus_seconds / 3600 : 0;
        const maxHeight = 100; // pixels
        const height = Math.min((hours / 8) * maxHeight, maxHeight); // Scale to 8 hours max

        const container = document.createElement('div');
        container.className = 'bar-container';

        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = `${height}px`;
        bar.title = `${hours.toFixed(1)}h`;

        const label = document.createElement('div');
        label.className = 'bar-label';
        label.textContent = days[date.getDay() === 0 ? 6 : date.getDay() - 1];

        container.appendChild(bar);
        container.appendChild(label);
        chart.appendChild(container);
      }
    }

    function showRecentSessions(sessions) {
      const list = document.getElementById('sessions-list');

      if (sessions.length === 0) {
        return;
      }

      list.innerHTML = '';

      // Show last 10 sessions
      const recent = sessions.slice(-10).reverse();

      recent.forEach(session => {
        const item = document.createElement('div');
        item.className = 'session-item';

        const info = document.createElement('div');
        info.style.flex = '1';

        const topic = document.createElement('div');
        topic.style.fontWeight = '600';
        topic.style.color = '#00d4ff';
        topic.style.marginBottom = '4px';
        topic.textContent = session.topic || 'Untitled';

        const duration = document.createElement('div');
        duration.className = 'session-duration';
        const minutes = Math.floor(session.duration / 60);
        duration.textContent = `${minutes} min${session.completed ? ' ✓' : ''}`;

        info.appendChild(topic);
        info.appendChild(duration);

        const time = document.createElement('div');
        time.className = 'session-time';
        const sessionDate = new Date(session.start_time);
        const now = new Date();
        const diffHours = Math.floor((now - sessionDate) / (1000 * 60 * 60));

        if (diffHours < 1) {
          time.textContent = 'Just now';
        } else if (diffHours < 24) {
          time.textContent = `${diffHours}h ago`;
        } else {
          time.textContent = sessionDate.toLocaleDateString();
        }

        item.appendChild(info);
        item.appendChild(time);
        list.appendChild(item);
      });
    }

    function showTopicBreakdown(sessions) {
      const container = document.getElementById('topics-breakdown');

      // Aggregate time by topic
      const topicMap = {};
      sessions.forEach(session => {
        const topic = session.topic || 'Untitled';
        if (!topicMap[topic]) {
          topicMap[topic] = { total: 0, sessions: 0, completed: 0 };
        }
        topicMap[topic].total += session.duration;
        topicMap[topic].sessions += 1;
        if (session.completed) topicMap[topic].completed += 1;
      });

      const topics = Object.entries(topicMap)
        .sort((a, b) => b[1].total - a[1].total)
        .slice(0, 5); // Top 5 topics

      if (topics.length === 0) {
        return;
      }

      container.innerHTML = '';

      topics.forEach(([topic, data]) => {
        const item = document.createElement('div');
        item.style.display = 'flex';
        item.style.justifyContent = 'space-between';
        item.style.padding = '12px 0';
        item.style.borderBottom = '1px solid rgba(255,255,255,0.05)';

        const left = document.createElement('div');
        const topicName = document.createElement('div');
        topicName.style.fontWeight = '600';
        topicName.style.color = '#00d4ff';
        topicName.style.marginBottom = '4px';
        topicName.textContent = topic;

        const sessions = document.createElement('div');
        sessions.style.fontSize = '12px';
        sessions.style.color = '#666';
        sessions.textContent = `${data.sessions} session${data.sessions > 1 ? 's' : ''} • ${data.completed} completed`;

        left.appendChild(topicName);
        left.appendChild(sessions);

        const right = document.createElement('div');
        right.style.textAlign = 'right';
        const hours = Math.floor(data.total / 3600);
        const mins = Math.floor((data.total % 3600) / 60);
        right.style.fontSize = '18px';
        right.style.fontWeight = '600';
        right.style.color = '#58a6ff';
        right.textContent = hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;

        item.appendChild(left);
        item.appendChild(right);
        container.appendChild(item);
      });
    }

    // Auto-refresh every 30 seconds
    setInterval(loadDashboard, 30000);

    // Initial load
    window.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>

</html>
